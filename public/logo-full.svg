<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 214 44"
  fill="none"
  role="img"
  aria-label="Megafone"
>
  <!--
    Megafone full lockup — icon (36×32 scaled ×1.3) + wordmark
    Bell faces left. Sound waves to the left, confirmed outside rim boundary.
  -->

  <g transform="translate(0, 2) scale(1.3)">

    <!-- Handle — behind cone -->
    <rect x="27" y="20" width="8" height="10" rx="2.5" fill="#0B0B0B"/>

    <!-- Cone body -->
    <path d="M 11 2 L 30 11 L 30 21 L 11 29 Z" fill="#0B0B0B"/>

    <!-- Rim -->
    <ellipse cx="11" cy="15.5" rx="5.5" ry="13.5" fill="#0B0B0B"/>

    <!-- Bell opening -->
    <ellipse cx="11" cy="15.5" rx="2.5" ry="8.5" fill="white"/>

    <!-- Sound waves -->
    <path d="M 5 11 Q 2.5 15.5 5 20" stroke="#0B0B0B" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M 3 8 Q 0.5 15.5 3 23" stroke="#0B0B0B" stroke-width="2.2" stroke-linecap="round"/>

  </g>

  <!-- Wordmark -->
  <text
    x="58"
    y="29"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="22"
    letter-spacing="-0.5"
    fill="#0B0B0B"
  >MEGAFONE</text>

</svg>
